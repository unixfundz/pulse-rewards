global:
  resolve_timeout: 5m
  smtp_from: alerts@pulse-rewards.io
  smtp_smarthost: smtp.example.com:587
  smtp_auth_username: alerts@pulse-rewards.io
  smtp_auth_password: REPLACE_WITH_SECRET

route:
  group_by: ["alertname", "severity"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: default

  routes:
    - matchers:
        - severity = critical
      receiver: pagerduty
      continue: true
    - matchers:
        - severity = warning
      receiver: slack

receivers:
  - name: default
    email_configs:
      - to: oncall@pulse-rewards.io

  - name: pagerduty
    pagerduty_configs:
      - service_key: REPLACE_WITH_PAGERDUTY_KEY

  - name: slack
    slack_configs:
      - api_url: REPLACE_WITH_SLACK_WEBHOOK
        channel: "#pulse-alerts"
        title: "{{ .GroupLabels.alertname }}"
        text: "{{ range .Alerts }}{{ .Annotations.summary }}{{ end }}"

inhibit_rules:
  - source_matchers:
      - severity = critical
    target_matchers:
      - severity = warning
    equal: ["alertname"]
