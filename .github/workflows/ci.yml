name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Backend ──────────────────────────────────────────────────
  backend:
    name: Backend (lint + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pulseRewards

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: pulse
          POSTGRES_PASSWORD: pulse
          POSTGRES_DB: pulse_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: pulseRewards/package-lock.json

      - run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npm run type-check

      - name: Run migrations
        env:
          DATABASE_URL: postgresql://pulse:pulse@localhost:5432/pulse_test
        run: npm run db:migrate

      - name: Test
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://pulse:pulse@localhost:5432/pulse_test
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: ci-test-secret-do-not-use-in-production
          JWT_PRIVATE_KEY: ${{ secrets.CI_JWT_PRIVATE_KEY }}
          JWT_PUBLIC_KEY: ${{ secrets.CI_JWT_PUBLIC_KEY }}
          FIELD_ENCRYPTION_KEY: ${{ secrets.CI_FIELD_ENCRYPTION_KEY }}
          STELLAR_NETWORK: testnet
          ISSUER_PUBLIC: GBTEST000000000000000000000000000000000000000000000000001
          DISTRIBUTION_PUBLIC: GBTEST000000000000000000000000000000000000000000000000002
        run: npm run test:ci

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          flags: backend
          directory: pulseRewards/coverage

  # ── Frontend ─────────────────────────────────────────────────
  frontend:
    name: Frontend (lint + test + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pulseRewards

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: pulseRewards/package-lock.json

      - run: npm ci

      - name: Lint
        run: npm run lint:frontend

      - name: Type-check frontend
        run: npm run type-check:frontend

      - name: Test frontend
        run: npm run test:frontend

      - name: Build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:3001
          NEXT_PUBLIC_STELLAR_NETWORK: testnet
        run: npm run build:frontend

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          flags: frontend

  # ── Contracts ────────────────────────────────────────────────
  contracts:
    name: Soroban contracts (fmt + clippy + test)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32v1-none
          components: rustfmt,clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: contracts

      - name: Format check
        working-directory: contracts
        run: cargo fmt --all -- --check

      - name: Clippy
        working-directory: contracts
        run: cargo clippy --all-targets -- -D warnings

      - name: Test
        working-directory: contracts
        run: cargo test --workspace

      - name: Build (release)
        working-directory: contracts
        run: cargo build --release --target wasm32v1-none

  # ── Security scan ────────────────────────────────────────────
  security:
    name: Security scan
    runs-on: ubuntu-latest
    permissions:
      security-events: write

    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-results.sarif
          severity: HIGH,CRITICAL

      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif
