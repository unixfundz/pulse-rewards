apiVersion: v1
kind: Service
metadata:
  name: pulse-backend
  labels:
    app: pulse-backend
spec:
  selector:
    app: pulse-backend
  ports:
    - port: 3001
      targetPort: 3001
      name: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pulse-frontend
  labels:
    app: pulse-frontend
    component: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: pulse-frontend
  template:
    metadata:
      labels:
        app: pulse-frontend
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
      containers:
        - name: frontend
          image: ghcr.io/unixfundz/pulse-rewards/frontend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          env:
            - name: NEXT_PUBLIC_API_URL
              valueFrom:
                configMapKeyRef:
                  name: pulse-config
                  key: api-url
            - name: NEXT_PUBLIC_STELLAR_NETWORK
              valueFrom:
                configMapKeyRef:
                  name: pulse-config
                  key: stellar-network
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 30
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: pulse-frontend
spec:
  selector:
    app: pulse-frontend
  ports:
    - port: 3000
      targetPort: 3000
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: pulse-config
data:
  stellar-network: "mainnet"
  api-url: "https://api.pulse-rewards.io"
---
# Secret template — populate with real values before applying
apiVersion: v1
kind: Secret
metadata:
  name: pulse-secrets
type: Opaque
stringData:
  database-url: "REPLACE_ME"
  redis-url: "REPLACE_ME"
  jwt-private-key: "REPLACE_ME"
  jwt-public-key: "REPLACE_ME"
  field-encryption-key: "REPLACE_ME"
  stellar-issuer-public: "REPLACE_ME"
  stellar-issuer-secret: "REPLACE_ME"
  stellar-distribution-public: "REPLACE_ME"
  stellar-distribution-secret: "REPLACE_ME"
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: pulse-ingress
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - pulse-rewards.io
        - api.pulse-rewards.io
      secretName: pulse-tls
  rules:
    - host: pulse-rewards.io
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: pulse-frontend
                port:
                  number: 3000
    - host: api.pulse-rewards.io
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: pulse-backend
                port:
                  number: 3001
